name: state_states
description: Educational US states geography game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  flutter_svg: ^2.3.0
  go_router: ^17.2.3
  path_drawing: ^1.0.1
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  just_audio: ^0.10.5
  google_mobile_ads: ^8.0.0
  url_launcher: ^6.3.2
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  riverpod_generator: ^4.0.3
  build_runner: ^2.15.0
  mocktail: ^1.0.5
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#F5F5F5"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/map/
    - assets/audio/
    - assets/icon/
